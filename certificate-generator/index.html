<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>Генератор подарочного сертификата</title>
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="auth-view" id="authView" aria-labelledby="authTitle">
        <div class="auth-panel">
          <p class="eyebrow">Волшебная живая баня</p>
          <h1 id="authTitle">Генератор сертификата</h1>
          <form class="auth-form" id="authForm" autocomplete="off">
            <label for="passwordInput">Пароль</label>
            <div class="password-row">
              <input id="passwordInput" name="password" type="password" inputmode="text" autocomplete="current-password" required>
              <button class="icon-button" id="togglePassword" type="button" aria-label="Показать пароль" title="Показать пароль">Показать</button>
            </div>
            <p class="form-message" id="authMessage" role="status" aria-live="polite"></p>
            <button class="primary-button" type="submit">Войти</button>
          </form>
        </div>
      </section>

      <section class="generator-view" id="generatorView" hidden>
        <div class="topbar">
          <div>
            <p class="eyebrow">Внутренний инструмент</p>
            <h1>Подарочный сертификат</h1>
          </div>
          <button class="ghost-button" id="logoutButton" type="button">Выйти</button>
        </div>

        <div class="workspace">
          <form class="controls" id="certificateForm" autocomplete="off">
            <div class="field">
              <label for="recipientInput">Для кого</label>
              <input id="recipientInput" name="recipient" type="text" maxlength="48" placeholder="Например: Анна" required>
            </div>
            <div class="field">
              <label for="amountInput">Сумма сертификата</label>
              <input id="amountInput" name="amount" type="text" inputmode="numeric" maxlength="28" placeholder="Например: 10 000 руб." required>
            </div>
            <div class="actions">
              <button class="primary-button" id="downloadButton" type="button">Скачать PNG</button>
              <button class="secondary-button" id="printButton" type="button">Печать</button>
              <button class="ghost-button" id="clearButton" type="button">Очистить</button>
            </div>
            <p class="hint">Текст автоматически уменьшается, если строка получается длинной.</p>
          </form>

          <div class="preview-wrap" aria-label="Предпросмотр сертификата">
            <div class="certificate-preview" id="certificatePreview">
              <img id="templateImage" src="./template.png" alt="Шаблон подарочного сертификата">
              <div class="certificate-text certificate-name" id="previewRecipient">Имя получателя</div>
              <div class="certificate-text certificate-amount" id="previewAmount">10 000 руб.</div>
            </div>
          </div>
        </div>

        <canvas id="certificateCanvas" width="1492" height="1054" hidden></canvas>
      </section>
    </main>

    <script src="./script.js" defer></script>
  </body>
</html>
